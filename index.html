<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>閲覧サイト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="topbar">
    <button id="btnTopo" type="button">🗺️ 地形図</button>
    <button id="btnClimate" type="button">🌦️ 気候図</button>
    <button id="btnRegion" type="button">🏷️ 地域図</button>
    <button id="btnContinent" type="button">🌏 大陸図</button>
    <button id="toggleBtn" type="button">国名を非表示</button>
    <button id="toggleNumBtn" type="button">番号を表示</button>
    <button id="downloadBtn" type="button">💾 画像を保存</button>
  </div>

  <div id="bgMapControls" style="display: none;">
    <div id="ctrl-topo" class="bg-control" style="display:none;">地形: <input type="range" id="op-topo" min="0" max="1" step="0.1" value="0.5"></div>
    <div id="ctrl-climate" class="bg-control" style="display:none;">気候: <input type="range" id="op-climate" min="0" max="1" step="0.1" value="0.5"></div>
    <div id="ctrl-region" class="bg-control" style="display:none;">地域: <input type="range" id="op-region" min="0" max="1" step="0.1" value="0.5"></div>
    <div id="ctrl-continent" class="bg-control" style="display:none;">大陸: <input type="range" id="op-continent" min="0" max="1" step="0.1" value="0.5"></div>
  </div>

  <div id="mapContainer"></div>

  <div id="statusIndicator">データ同期中...</div>
  <div id="sliderContainer">
    <span class="zoom-label">−</span>
    <input type="range" id="zoomSlider" min="0.5" max="5" step="0.1" value="1">
    <span class="zoom-label">+</span>
  </div>

  <script src="viewer.js"></script>
</body>
</html>
